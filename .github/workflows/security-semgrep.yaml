name: Reusable - Security scan (Semgrep SAST)

# SAST with Semgrep (mirrors versa-gitlab-cicd hidden-jobs/semgrep.yaml).
# Auto-detects languages by default; uploads a JSON report. Report-only unless
# fail_on_findings is true.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
        description: Runner label to execute on (e.g. ubuntu-latest or a self-hosted/ARC scale-set).
      config:
        type: string
        default: "p/default"
        description: Semgrep rule config (e.g. "p/default", "p/owasp-top-ten", "auto").
      scan_path:
        type: string
        default: "."
        description: Path within the checked-out repo for Semgrep to scan.
      severity:
        type: string
        default: "ERROR"
        description: Minimum severity to report/gate on (ERROR, WARNING, or INFO).
      fail_on_findings:
        type: boolean
        default: false
        description: Fail the job when findings at the chosen severity exist; default is report-only.
      semgrep_version:
        type: string
        default: "1.163.0"
        description: Semgrep version to install on the runner (pip).
      report_retention_days:
        type: number
        default: 7
        description: Days to retain the uploaded Semgrep report artifact.

jobs:
  semgrep:
    runs-on: ${{ inputs.runner }}
    # Installed on the runner (pip) rather than a job container, so this runs on a container-less
    # self-hosted/ARC runner (no Docker-in-Docker) as well as ubuntu-latest.
    steps:
      - uses: actions/checkout@v5
      - name: Install Semgrep
        run: |
          set -eu
          # Container-less ARC runners ship python3 but NOT pip/ensurepip (and venv can't bootstrap
          # without ensurepip). Bootstrap pip via get-pip.py over the network — no apt/sudo required.
          # On GitHub-hosted runners pip already exists, so the bootstrap is skipped.
          if ! python3 -m pip --version >/dev/null 2>&1; then
            curl -fsSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py
            python3 /tmp/get-pip.py --user --break-system-packages
          fi
          # --break-system-packages: runner Python is PEP 668 "externally managed" (Ubuntu 24.04 / py3.12).
          python3 -m pip install --user --break-system-packages --quiet "semgrep==${{ inputs.semgrep_version }}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Semgrep scan (report)
        run: |
          set -eu
          mkdir -p reports
          semgrep scan --config ${{ inputs.config }} --severity ${{ inputs.severity }} \
            --json -o reports/semgrep-report.json "${{ inputs.scan_path }}" || true
          semgrep scan --config ${{ inputs.config }} --severity ${{ inputs.severity }} \
            "${{ inputs.scan_path }}" || true
      - name: Job summary (summary + detail)
        if: always()
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, os, html
          try:
              data = json.load(open("reports/semgrep-report.json"))
          except Exception as e:
              print(f"No Semgrep report ({e})"); raise SystemExit(0)
          res = data.get("results", [])
          sev = {}
          for r in res:
              s = r.get("extra", {}).get("severity", "INFO")
              sev[s] = sev.get(s, 0) + 1
          print("## 🔬 Semgrep SAST")
          print()
          print(f"**Total: {len(res)}**  ·  gate: _{'fail on findings' if os.environ.get('FAIL')=='true' else 'report-only'}_")
          print()
          print("| Severity | Count |"); print("|---|---|")
          for s in ("ERROR", "WARNING", "INFO"):
              print(f"| {s} | {sev.get(s,0)} |")
          print()
          if res:
              print(f"<details><summary>Detail report ({len(res)} findings, top 200)</summary>")
              print()
              print("| Severity | Rule | Location | Message |"); print("|---|---|---|---|")
              for r in res[:200]:
                  rule = r.get("check_id", "")
                  path = r.get("path", "")
                  line = r.get("start", {}).get("line", 0)
                  s = r.get("extra", {}).get("severity", "")
                  msg = (r.get("extra", {}).get("message", "") or "").replace("|", " ").replace("\n", " ")[:200]
                  print(f"| {s} | {rule} | {path}:{line} | {msg} |")
              print(); print("</details>")
          else:
              print("✅ No findings.")
          print()
          PY
        env:
          FAIL: ${{ inputs.fail_on_findings }}
      - name: Gate
        if: ${{ inputs.fail_on_findings }}
        run: |
          set -eu
          COUNT=$(python3 -c "import json;print(len(json.load(open('reports/semgrep-report.json')).get('results',[])))")
          echo "semgrep findings: ${COUNT}"
          [ "${COUNT}" -eq 0 ] || { echo "::error title=SAST findings::${COUNT} ${{ inputs.severity }} finding(s)"; exit 1; }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: reports/
          retention-days: ${{ inputs.report_retention_days }}
