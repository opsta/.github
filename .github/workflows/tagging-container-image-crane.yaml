name: Reusable - Tag container image (crane)

# Promote-by-retag: copy an existing image to a new tag without rebuilding.
# Mirrors versa-gitlab-cicd hidden-jobs/tagging-container-image-crane.yaml.
# Runs on a runner with network reach to the registry (ARC for in-cluster registries).

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
        description: Runner label to execute on (e.g. ubuntu-latest or a self-hosted/ARC scale-set).
      image:
        type: string
        required: true
        description: Image ref WITHOUT tag.
      tag_from:
        type: string
        required: true
        description: Source image tag to copy from.
      tag_to:
        type: string
        required: true
        description: New image tag to copy to.
      moving_tag:
        type: string
        default: ""
        description: >-
          Optional moving alias (e.g. "uat") updated to point at the promoted image too, so the
          next stage can crane-copy from the alias. Empty = copy to tag_to only.
      registry_insecure:
        type: boolean
        default: false
        description: Pull/push over HTTP / skip registry TLS verify (adds crane --insecure).
      crane_version:
        type: string
        default: v0.20.2
        description: go-containerregistry (crane) release version to install on the runner.
    secrets:
      registry_username:
        required: false
        description: Registry username for crane auth login (when the registry requires auth).
      registry_password:
        required: false
        description: Registry password/token for crane auth login; presence triggers a login before copy.

jobs:
  retag:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Install crane
        run: |
          set -eu
          BIN="$RUNNER_TEMP/bin"; mkdir -p "$BIN"
          curl -sSL "https://github.com/google/go-containerregistry/releases/download/${{ inputs.crane_version }}/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar -xz -C "$BIN" crane
          chmod +x "$BIN/crane"; echo "$BIN" >> "$GITHUB_PATH"
      - name: Retag
        run: |
          set -eu
          FLAGS=""; [ "${{ inputs.registry_insecure }}" = "true" ] && FLAGS="--insecure"
          if [ -n "${{ secrets.registry_password }}" ]; then
            REGISTRY="${{ inputs.image }}"; REGISTRY="${REGISTRY%%/*}"
            crane auth login $FLAGS -u "${{ secrets.registry_username }}" -p "${{ secrets.registry_password }}" "$REGISTRY"
          fi
          crane copy $FLAGS "${{ inputs.image }}:${{ inputs.tag_from }}" "${{ inputs.image }}:${{ inputs.tag_to }}"
          echo "✓ ${{ inputs.image }}:${{ inputs.tag_from }} -> :${{ inputs.tag_to }}"
          # Optional moving alias (e.g. uat) updated to the promoted image for the next stage's tag_from.
          if [ -n "${{ inputs.moving_tag }}" ]; then
            crane copy $FLAGS "${{ inputs.image }}:${{ inputs.tag_to }}" "${{ inputs.image }}:${{ inputs.moving_tag }}"
            echo "✓ ${{ inputs.image }}:${{ inputs.tag_to }} -> :${{ inputs.moving_tag }} (moving alias)"
          fi
