name: Reusable - Tag container image (crane, in-cluster)

# Promote-by-retag: copy an existing image to a new tag WITHOUT rebuilding (build-once /
# promote-by-copy). Runs crane as an in-cluster Kubernetes Job (like build-container-image-kaniko),
# NOT on the runner — so it gets ClusterFirst DNS and can resolve an in-cluster registry hostname
# (e.g. a k3d registry). The ARC runner only submits the Job; the runner's ServiceAccount must have
# RBAC to manage Jobs in build_namespace.
#
# Why a Job (not on-runner crane): ARC ephemeral runner pods inherit the node host resolver, which
# can't resolve in-cluster registry hostnames; the kaniko build already runs in-cluster for the same
# reason. On GKE the registry is public DNS (Artifact Registry), so either path works — the Job is
# provider-neutral and lets crane reach AR via a Workload-Identity-bound ServiceAccount.
#
# CROSS-REGISTRY BRIDGE (v2.0 cross-provider promote): set `dst_image` to copy into a DIFFERENT
# registry than the source (e.g. promote dev/uat on the k3d local registry → prd on Artifact
# Registry, or AR → k3d). Source/destination auth are independent: `registry_username/password`
# auth the SOURCE registry, `dst_registry_username/password` the DEST — both written into one docker
# config (the `auths` map is keyed by registry host, so crane authenticates each side correctly in a
# single copy). A side needing no auth (k3d local over HTTP, with registry_insecure) simply omits its
# creds. When the centralized ARC runs on k3d (no Workload Identity), reach AR by passing a short-lived
# AR token as dst basic auth (username `oauth2accesstoken`); the WI ServiceAccount path still works
# when the ARC itself runs on GKE. dst_image defaults to `image` → unchanged single-registry behavior.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        required: true
        description: Runner label with in-cluster kubectl access (e.g. an ARC scale set).
      image:
        type: string
        required: true
        description: Source image ref WITHOUT tag.
      dst_image:
        type: string
        default: ""
        description: >-
          Destination image ref WITHOUT tag, for a cross-registry promote (e.g. AR ref when the source
          is the k3d local registry). Empty = copy within `image` (back-compat, single registry).
      tag_from:
        type: string
        required: true
        description: Source image tag to copy from.
      tag_to:
        type: string
        required: true
        description: New image tag to copy to.
      moving_tag:
        type: string
        default: ""
        description: >-
          Optional moving alias (e.g. "uat") updated to point at the promoted image too, so the
          next stage can crane-copy from the alias. Empty = copy to tag_to only.
      registry_insecure:
        type: boolean
        default: false
        description: Pull/push over HTTP / skip registry TLS verify (adds crane --insecure).
      crane_image:
        type: string
        default: gcr.io/go-containerregistry/crane:v0.21.6
        description: crane (go-containerregistry) image the in-cluster Job runs.
      build_namespace:
        type: string
        default: ci
        description: Kubernetes namespace where the crane Job (and optional auth secret) is created.
      kubectl_version:
        type: string
        default: v1.31.4
        description: kubectl release version downloaded onto the runner to submit the Job.
      crane_service_account:
        type: string
        default: ""
        description: >-
          Optional ServiceAccount for the crane Job pod. Set to a Workload-Identity-bound KSA so
          crane reaches a cloud registry (Artifact Registry) via the GKE metadata token (crane's
          default keychain auto-authenticates *.pkg.dev / *.gcr.io). Empty = namespace default SA.
      job_timeout:
        type: string
        default: "300s"
        description: kubectl wait timeout for each crane copy Job.
    secrets:
      registry_username:
        required: false
        description: SOURCE registry username for crane auth (when the source registry requires basic auth).
      registry_password:
        required: false
        description: SOURCE registry password/token; presence mounts a docker config into the Job (DOCKER_CONFIG).
      dst_registry_username:
        required: false
        description: DEST registry username (cross-registry promote; e.g. `oauth2accesstoken` for an AR token).
      dst_registry_password:
        required: false
        description: DEST registry password/token; added to the same docker config under the dest registry host.

jobs:
  retag:
    runs-on: ${{ inputs.runner }}
    env:
      NS: ${{ inputs.build_namespace }}
      AUTH_SECRET: crane-auth-${{ github.run_id }}
    steps:
      - name: Install kubectl (writable PATH; ARC runner is non-root)
        run: |
          set -eu
          BIN="$RUNNER_TEMP/bin"; mkdir -p "$BIN"
          curl -sSLo "$BIN/kubectl" "https://dl.k8s.io/release/${{ inputs.kubectl_version }}/bin/linux/amd64/kubectl"
          chmod +x "$BIN/kubectl"
          echo "$BIN" >> "$GITHUB_PATH"

      - name: Optional registry auth secret (basic auth → docker config; source + dest)
        # NOTE: the `secrets` context is NOT allowed in a step-level `if:` (GitHub rejects it at
        # workflow load → caller startup_failure). Pass via env and check in the shell instead.
        # Builds ONE docker config holding an entry per registry that has creds (source + dest),
        # keyed by registry host → crane authenticates each side of a cross-registry copy correctly.
        env:
          REG_USER: ${{ secrets.registry_username }}
          REG_PASS: ${{ secrets.registry_password }}
          DST_USER: ${{ secrets.dst_registry_username }}
          DST_PASS: ${{ secrets.dst_registry_password }}
        run: |
          set -eu
          ENTRIES=""
          add_auth() {
            HOST="$1"; U="$2"; P="$3"
            [ -n "${P:-}" ] || return 0
            A=$(printf '%s:%s' "$U" "$P" | base64 -w0)
            ENTRIES="${ENTRIES:+$ENTRIES,}$(printf '"%s":{"auth":"%s"}' "$HOST" "$A")"
          }
          SRC_REG="${{ inputs.image }}"; SRC_REG="${SRC_REG%%/*}"
          DST_IMG="${{ inputs.dst_image }}"; [ -n "$DST_IMG" ] || DST_IMG="${{ inputs.image }}"
          DST_REG="${DST_IMG%%/*}"
          add_auth "$SRC_REG" "$REG_USER" "$REG_PASS"
          [ "$DST_REG" = "$SRC_REG" ] || add_auth "$DST_REG" "$DST_USER" "$DST_PASS"
          [ -n "$ENTRIES" ] || { echo "no registry creds → skip auth secret"; exit 0; }
          CFG="{\"auths\":{$ENTRIES}}"
          kubectl -n "$NS" create secret generic "$AUTH_SECRET" \
            --from-literal=config.json="$CFG" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Crane copy via in-cluster Job(s)
        env:
          REG_PASS: ${{ secrets.registry_password }}
          DST_PASS: ${{ secrets.dst_registry_password }}
        run: |
          set -eu
          FLAGS_JSON=""
          [ "${{ inputs.registry_insecure }}" = "true" ] && FLAGS_JSON="\"--insecure\","
          SA_LINE=""; CRANE_IMG="${{ inputs.crane_image }}"; GCMD_ENV=""
          DST_IMG="${{ inputs.dst_image }}"; [ -n "$DST_IMG" ] || DST_IMG="${{ inputs.image }}"
          HAS_AUTH=""
          { [ -n "${REG_PASS:-}" ] || [ -n "${DST_PASS:-}" ]; } && HAS_AUTH=1
          if [ -n "${{ inputs.crane_service_account }}" ]; then
            SA_LINE="serviceAccountName: ${{ inputs.crane_service_account }}"
            # gcrane = crane with the Google keychain (GCR/Artifact Registry auth). Its Go ADC can't
            # resolve metadata.google.internal via DNS in-pod, so GCE_METADATA_HOST=169.254.169.254 (env
            # below) points it at the metadata IP → the Workload-Identity token flows. Verified on
            # GKE→AR. Swap crane→gcrane on the cloud path; same `copy` interface.
            CRANE_IMG="$(printf '%s' "$CRANE_IMG" | sed 's#/crane:#/gcrane:#')"
            GCMD_ENV=1
          fi

          run_copy() {
            SRC="$1"; DST="$2"
            # Unique Job name PER image — a matrix of services (api/worker) calls this reusable in
            # parallel with the SAME github.run_id, so a run_id-only name collides ("spec.template
            # field is immutable" on the 2nd apply). Hash the source ref to disambiguate; delete any
            # stale Job (rerun with same name) first.
            H=$(printf '%s' "${SRC}" | md5sum | cut -c1-8)
            JN="crane-$3-${{ github.run_id }}-${H}"
            echo "→ crane copy ${SRC} -> ${DST} (Job ${JN})"
            kubectl -n "$NS" delete job "${JN}" --ignore-not-found >/dev/null 2>&1 || true
            # ENV is additive: a cross-registry copy can need BOTH a docker config (basic-auth side)
            # AND the GCE metadata host (WI side) at once, so build the env list from whatever applies.
            ENV_ITEMS=""; VOL_MOUNT=""; VOL=""
            if [ -n "$HAS_AUTH" ]; then
              ENV_ITEMS="{name: DOCKER_CONFIG, value: /dockercfg}"
              VOL_MOUNT='volumeMounts: [{name: dockercfg, mountPath: /dockercfg, readOnly: true}]'
              VOL="volumes: [{name: dockercfg, secret: {secretName: ${AUTH_SECRET}, items: [{key: config.json, path: config.json}]}}]"
            fi
            if [ -n "$GCMD_ENV" ]; then
              ENV_ITEMS="${ENV_ITEMS:+$ENV_ITEMS, }{name: GCE_METADATA_HOST, value: \"169.254.169.254\"}"
            fi
            ENV_LINE=""; [ -n "$ENV_ITEMS" ] && ENV_LINE="env: [${ENV_ITEMS}]"
            cat <<YAML | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JN}
            namespace: ${NS}
            labels:
              app.kubernetes.io/managed-by: opsta-ci
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 1800
            template:
              spec:
                restartPolicy: Never
                ${SA_LINE}
                containers:
                  - name: crane
                    image: ${CRANE_IMG}
                    args: [ "copy", ${FLAGS_JSON} "${SRC}", "${DST}" ]
                    ${ENV_LINE}
                    ${VOL_MOUNT}
                ${VOL}
          YAML
            if ! kubectl -n "$NS" wait --for=condition=complete "job/${JN}" --timeout=${{ inputs.job_timeout }}; then
              echo "::error title=crane copy failed::${SRC} -> ${DST}"
              kubectl -n "$NS" logs "job/${JN}" --tail=40 || true
              kubectl -n "$NS" delete job "${JN}" --ignore-not-found
              exit 1
            fi
            kubectl -n "$NS" logs "job/${JN}" --tail=4 || true
            kubectl -n "$NS" delete job "${JN}" --ignore-not-found
          }

          run_copy "${{ inputs.image }}:${{ inputs.tag_from }}" "${DST_IMG}:${{ inputs.tag_to }}" "to"
          echo "✓ ${{ inputs.image }}:${{ inputs.tag_from }} -> ${DST_IMG}:${{ inputs.tag_to }}"
          if [ -n "${{ inputs.moving_tag }}" ]; then
            run_copy "${DST_IMG}:${{ inputs.tag_to }}" "${DST_IMG}:${{ inputs.moving_tag }}" "mv"
            echo "✓ ${DST_IMG}:${{ inputs.tag_to }} -> :${{ inputs.moving_tag }} (moving alias)"
          fi

      - name: Cleanup auth secret
        if: always()
        run: kubectl -n "$NS" delete secret "$AUTH_SECRET" --ignore-not-found 2>/dev/null || true
