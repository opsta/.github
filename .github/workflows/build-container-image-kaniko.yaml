name: Reusable - Build container image (kaniko, in-cluster)

# Builds ONE service image with kaniko as an in-cluster Kubernetes Job, pushing
# to a registry reachable from the cluster (e.g. a private in-cluster registry).
# Mirrors versa-gitlab-cicd hidden-jobs/build-container-image-kaniko.yaml, adapted
# to GitHub Actions + self-hosted (ARC) runners that submit a kaniko Job.
#
# Loop over services with a matrix in the calling workflow (one call per service).
# The runner's ServiceAccount must have RBAC to manage Jobs/secrets in build_namespace.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        required: true
        description: Runner label with in-cluster kubectl access (e.g. an ARC scale set).
      service:
        type: string
        required: true
        description: Service name being built; used to name the kaniko Job and secret.
      image:
        type: string
        required: true
        description: Full image ref WITHOUT tag, e.g. registry:5000/app/svc.
      image_tag:
        type: string
        required: true
        description: Tag to push the built image as (kaniko --destination tag).
      moving_tag:
        type: string
        default: ""
        description: >-
          Optional moving alias tag (e.g. "dev"/"uat") pushed alongside image_tag in the SAME
          kaniko build (a second --destination). Enables build-once / promote-by-copy where a
          later stage crane-copies from the moving alias. Empty = push image_tag only.
      git_repo:
        type: string
        required: true
        description: owner/repo for the kaniko git build context.
      git_ref:
        type: string
        required: true
        description: Commit SHA (or ref) kaniko checks out for the build context.
      context_sub_path:
        type: string
        required: true
        description: Path within the repo to build, e.g. src/productpage.
      dockerfile:
        type: string
        default: Dockerfile
        description: Dockerfile path (relative to context_sub_path) kaniko builds.
      build_args:
        type: string
        default: ""
        description: Space-separated key=value pairs passed as --build-arg.
      build_namespace:
        type: string
        default: ci
        description: Kubernetes namespace where the kaniko Job and git-credential secret are created.
      kaniko_image:
        type: string
        default: gcr.io/kaniko-project/executor:v1.23.2
        description: kaniko executor image to run the build with.
      kubectl_version:
        type: string
        default: v1.31.4
        description: kubectl release version downloaded onto the runner to submit the Job.
      registry_insecure:
        type: boolean
        default: true
        description: Push over HTTP / skip registry TLS verify (adds kaniko --insecure --skip-tls-verify).
      build_timeout:
        type: string
        default: "600s"
        description: kubectl wait timeout for the kaniko Job to complete (e.g. 600s).
      kaniko_service_account:
        type: string
        default: ""
        description: >-
          Optional ServiceAccount name for the kaniko Job pod. Set this to a
          Workload-Identity-bound KSA (annotated iam.gke.io/gcp-service-account)
          so kaniko pushes to a cloud registry (e.g. Artifact Registry) via the
          GKE metadata token — no docker config/key file needed. Empty = use the
          namespace default ServiceAccount (in-cluster registry case).
    secrets:
      git_token:
        required: true
        description: Token kaniko uses to clone the (private) git build context.
    outputs:
      image_digest:
        description: sha256 manifest digest of the pushed image (for immutable/digest pinning).
        value: ${{ jobs.build.outputs.image_digest }}

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    outputs:
      image_digest: ${{ steps.digest.outputs.image_digest }}
    env:
      JOB_NAME: build-${{ inputs.service }}-${{ github.run_id }}
      SECRET_NAME: kaniko-git-${{ inputs.service }}-${{ github.run_id }}
      NS: ${{ inputs.build_namespace }}
    steps:
      - name: Install kubectl (writable PATH; ARC runner is non-root)
        run: |
          set -eu
          BIN="$RUNNER_TEMP/bin"; mkdir -p "$BIN"
          curl -sSLo "$BIN/kubectl" "https://dl.k8s.io/release/${{ inputs.kubectl_version }}/bin/linux/amd64/kubectl"
          chmod +x "$BIN/kubectl"
          echo "$BIN" >> "$GITHUB_PATH"

      - name: Create kaniko git-credential secret
        run: |
          kubectl -n "$NS" create secret generic "$SECRET_NAME" \
            --from-literal=token="${{ secrets.git_token }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Submit kaniko build Job and wait
        run: |
          set -eu
          # Build the kaniko args as a single-line JSON array (YAML flow sequence)
          # so injected build-args/flags can't break block indentation.
          ARGS="[\"--context=git://github.com/${{ inputs.git_repo }}.git#${{ inputs.git_ref }}\""
          ARGS="${ARGS},\"--context-sub-path=${{ inputs.context_sub_path }}\""
          ARGS="${ARGS},\"--dockerfile=${{ inputs.dockerfile }}\""
          ARGS="${ARGS},\"--destination=${{ inputs.image }}:${{ inputs.image_tag }}\""
          # Optional moving alias (e.g. dev/uat) pushed in the same build — kaniko supports
          # multiple --destination flags, so the alias and the immutable tag share one build.
          if [ -n "${{ inputs.moving_tag }}" ]; then ARGS="${ARGS},\"--destination=${{ inputs.image }}:${{ inputs.moving_tag }}\""; fi
          for ba in ${{ inputs.build_args }}; do ARGS="${ARGS},\"--build-arg=${ba}\""; done
          if [ "${{ inputs.registry_insecure }}" = "true" ]; then ARGS="${ARGS},\"--insecure\",\"--skip-tls-verify\""; fi
          ARGS="${ARGS}]"
          # Optionally run the kaniko pod under a Workload-Identity-bound KSA so it
          # can push to a cloud registry (Artifact Registry) via the metadata token.
          SA_LINE=""; VOL_LINE=""; MOUNT_LINE=""
          CFG_NAME="kaniko-dockercfg-${{ inputs.service }}-${{ github.run_id }}"
          if [ -n "${{ inputs.kaniko_service_account }}" ]; then
            SA_LINE="serviceAccountName: ${{ inputs.kaniko_service_account }}"
            # kaniko's bundled docker-credential-gcr auto-handles gcr.io but NOT *.pkg.dev. Map the
            # Artifact Registry host explicitly to the 'gcr' helper so kaniko authenticates to AR via
            # the GKE Workload Identity metadata token (no GOOGLE_APPLICATION_CREDENTIALS needed).
            # Ref: github.com/GoogleContainerTools/kaniko issues #1256/#1805/#1585.
            REG_HOST="$(printf '%s' '${{ inputs.image }}' | cut -d/ -f1)"
            kubectl -n "$NS" create configmap "$CFG_NAME" \
              --from-literal=config.json="{\"credHelpers\":{\"${REG_HOST}\":\"gcr\"}}" \
              --dry-run=client -o yaml | kubectl apply -f -
            VOL_LINE='volumes: [{"name":"docker-config","configMap":{"name":"'"$CFG_NAME"'"}}]'
            MOUNT_LINE='volumeMounts: [{"name":"docker-config","mountPath":"/kaniko/.docker/config.json","subPath":"config.json"}]'
          fi
          cat <<YAML | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JOB_NAME}
            namespace: ${NS}
            labels:
              app.kubernetes.io/managed-by: opsta-ci
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 1800
            template:
              spec:
                restartPolicy: Never
                ${SA_LINE}
                ${VOL_LINE}
                containers:
                  - name: kaniko
                    image: ${{ inputs.kaniko_image }}
                    args: ${ARGS}
                    ${MOUNT_LINE}
                    env:
                      - name: GIT_USERNAME
                        value: x-access-token
                      - name: GIT_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: ${SECRET_NAME}
                            key: token
          YAML
          if ! kubectl -n "$NS" wait --for=condition=complete "job/${JOB_NAME}" --timeout=${{ inputs.build_timeout }}; then
            echo "::error title=kaniko build failed::${{ inputs.service }}"
            kubectl -n "$NS" logs "job/${JOB_NAME}" --tail=60 || true
            kubectl -n "$NS" delete configmap "$CFG_NAME" --ignore-not-found >/dev/null 2>&1 || true
            exit 1
          fi
          kubectl -n "$NS" logs "job/${JOB_NAME}" --tail=8 || true
          kubectl -n "$NS" delete configmap "$CFG_NAME" --ignore-not-found >/dev/null 2>&1 || true

      - name: Resolve pushed image digest
        id: digest
        run: |
          set -eu
          IMAGE="${{ inputs.image }}"
          REGISTRY="${IMAGE%%/*}"          # host[:port]
          REPO="${IMAGE#*/}"               # path after host
          SCHEME=http
          [ "${{ inputs.registry_insecure }}" = "true" ] || SCHEME=https
          # Cloud registries (Artifact Registry *.pkg.dev) reject anonymous manifest
          # GETs — add a bearer token from the GKE metadata server. Requires the
          # runner pod's KSA to be Workload-Identity-bound with AR read access.
          AUTH_HEADER=()
          case "$REGISTRY" in
            *.pkg.dev)
              TOKEN=$(curl -s -H 'Metadata-Flavor: Google' \
                "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" \
                | tr -d '\r' | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              [ -n "$TOKEN" ] && AUTH_HEADER=(-H "Authorization: Bearer ${TOKEN}")
              ;;
          esac
          DIGEST=$(curl -sSI -k "${AUTH_HEADER[@]}" \
            -H 'Accept: application/vnd.oci.image.index.v1+json' \
            -H 'Accept: application/vnd.oci.image.manifest.v1+json' \
            -H 'Accept: application/vnd.docker.distribution.manifest.v2+json' \
            "${SCHEME}://${REGISTRY}/v2/${REPO}/manifests/${{ inputs.image_tag }}" \
            | tr -d '\r' | awk -F': ' 'tolower($1)=="docker-content-digest"{print $2}')
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "digest: ${DIGEST:-<none>}"

      - name: Cleanup
        if: always()
        run: |
          kubectl -n "$NS" delete secret "$SECRET_NAME" --ignore-not-found
          kubectl -n "$NS" delete job "$JOB_NAME" --ignore-not-found
