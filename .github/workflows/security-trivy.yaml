name: Reusable - Security scan (Trivy)

# Granular Trivy scan, one tool many modes (mirrors versa-gitlab-cicd hidden-jobs/trivy.yaml:
# .trivy-image / .trivy-iac / .trivy-secrets / .trivy-sca). Always uploads a report;
# only fails the job when fail_on_severity is set (default: report-only).

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
        description: Use a self-hosted/ARC runner for scan_type=image against an in-cluster registry.
      scan_type:
        type: string
        required: true
        description: "image | config | secret | fs (fs = vuln+misconfig+secret on the source tree)."
      scan_ref:
        type: string
        default: "."
        description: Filesystem path (fs/config/secret) or full image ref (image).
      severity:
        type: string
        default: "CRITICAL,HIGH"
        description: Comma-separated severities to include in the report (e.g. CRITICAL,HIGH).
      fail_on_severity:
        type: string
        default: ""
        description: When set (e.g. CRITICAL), fail the job on findings at/above it. Empty = report-only.
      report_name:
        type: string
        default: ""
        description: Base name for the report files/artifact; defaults to trivy-<scan_type> when empty.
      trivy_version:
        type: string
        default: v0.70.0
        description: Trivy release version to install on the runner.
      registry_insecure:
        type: boolean
        default: false
        description: Pull images over HTTP / skip registry TLS verify (sets TRIVY_INSECURE and TRIVY_NON_SSL).
      report_retention_days:
        type: number
        default: 7
        description: Days to retain the uploaded Trivy report artifact.

jobs:
  trivy:
    runs-on: ${{ inputs.runner }}
    env:
      TRIVY_INSECURE: ${{ inputs.registry_insecure }}
      TRIVY_NON_SSL: ${{ inputs.registry_insecure }}
      REPORT: ${{ inputs.report_name != '' && inputs.report_name || format('trivy-{0}', inputs.scan_type) }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ inputs.scan_type != 'image' }}
      - name: Install Trivy + jq
        run: |
          set -eu
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin" "${{ inputs.trivy_version }}"
          command -v jq >/dev/null 2>&1 || {
            curl -sSLo "$RUNNER_TEMP/bin/jq" https://github.com/jqlang/jq/releases/latest/download/jq-linux-amd64
            chmod +x "$RUNNER_TEMP/bin/jq"; }
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Scan (report)
        run: |
          set -eu
          mkdir -p reports
          case "${{ inputs.scan_type }}" in
            image)  # Report-only: a registry pull/auth failure (e.g. the runner lacks
                    # read creds for a cloud registry) must not fail the pipeline.
                    { trivy image --scanners vuln,misconfig,secret --exit-code 0 --severity "${{ inputs.severity }}" \
                        --format table -o "reports/${REPORT}.txt" "${{ inputs.scan_ref }}" \
                      && trivy image --scanners vuln,misconfig,secret --exit-code 0 --format json \
                        -o "reports/${REPORT}.json" "${{ inputs.scan_ref }}" ; } \
                    || echo "::warning::trivy image scan could not complete (registry pull/auth?) — report-only, not failing the pipeline" ;;
            config) trivy config --exit-code 0 --severity "${{ inputs.severity }}" \
                      --format table -o "reports/${REPORT}.txt" "${{ inputs.scan_ref }}"
                    trivy config --exit-code 0 --format json -o "reports/${REPORT}.json" "${{ inputs.scan_ref }}" ;;
            secret) trivy fs --scanners secret --exit-code 0 --format table -o "reports/${REPORT}.txt" "${{ inputs.scan_ref }}"
                    trivy fs --scanners secret --exit-code 0 --format json -o "reports/${REPORT}.json" "${{ inputs.scan_ref }}" ;;
            fs)     trivy fs --scanners vuln,misconfig,secret --exit-code 0 --severity "${{ inputs.severity }}" \
                      --format table -o "reports/${REPORT}.txt" "${{ inputs.scan_ref }}"
                    trivy fs --scanners vuln,misconfig,secret --exit-code 0 --format json \
                      -o "reports/${REPORT}.json" "${{ inputs.scan_ref }}" ;;
            *) echo "::error::unknown scan_type ${{ inputs.scan_type }}"; exit 1 ;;
          esac
          echo "----- ${REPORT} -----"; cat "reports/${REPORT}.txt" || true
      - name: Job summary (summary + detail)
        if: always()
        run: |
          set -eu
          J="reports/${REPORT}.json"
          [ -f "$J" ] || { echo "No report for ${REPORT}" >> "$GITHUB_STEP_SUMMARY"; exit 0; }
          # Flatten all finding types to {Severity, Id, Target, Title}
          ALL=$(jq -c '[ .Results[]? as $r
            | ( ($r.Vulnerabilities[]?  | {Severity, Id:.VulnerabilityID, Target:$r.Target, Title:(.Title // .PkgName // "")}),
                ($r.Misconfigurations[]?| {Severity, Id:.ID,              Target:$r.Target, Title:(.Title // "")}),
                ($r.Secrets[]?          | {Severity, Id:.RuleID,          Target:$r.Target, Title:(.Title // "")}) ) ]' "$J")
          c() { echo "$ALL" | jq -r --arg s "$1" '[.[]|select(.Severity==$s)]|length'; }
          CR=$(c CRITICAL); HI=$(c HIGH); ME=$(c MEDIUM); LO=$(c LOW); UN=$(c UNKNOWN)
          TOTAL=$(echo "$ALL" | jq -r 'length')
          GATE="report-only"; [ -n "${{ inputs.fail_on_severity }}" ] && GATE="fail ≥ ${{ inputs.fail_on_severity }}"
          {
            echo "## 🛡️ Trivy ${{ inputs.scan_type }} — \`${{ inputs.scan_ref }}\`"
            echo ""
            echo "**Total: ${TOTAL}**  ·  gate: _${GATE}_"
            echo ""
            echo "| Severity | Count |"
            echo "|---|---|"
            echo "| 🔴 CRITICAL | ${CR} |"
            echo "| 🟠 HIGH | ${HI} |"
            echo "| 🟡 MEDIUM | ${ME} |"
            echo "| 🔵 LOW | ${LO} |"
            echo "| ⚪ UNKNOWN | ${UN} |"
            echo ""
            if [ "${TOTAL}" -gt 0 ]; then
              echo "<details><summary>Detail report (${TOTAL} findings, top 200)</summary>"
              echo ""
              echo "| Severity | ID | Target | Title |"
              echo "|---|---|---|---|"
              echo "$ALL" | jq -r '.[] | "| \(.Severity) | \(.Id) | \(.Target) | \(.Title|gsub("[|\n]";" ")) |"' | head -200
              echo ""
              echo "</details>"
            else
              echo "✅ No findings."
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Gate
        if: ${{ inputs.fail_on_severity != '' }}
        run: |
          set -eu
          case "${{ inputs.scan_type }}" in
            image)  trivy image  --exit-code 1 --severity "${{ inputs.fail_on_severity }}" --scanners vuln,misconfig,secret "${{ inputs.scan_ref }}" ;;
            config) trivy config --exit-code 1 --severity "${{ inputs.fail_on_severity }}" "${{ inputs.scan_ref }}" ;;
            secret) trivy fs --scanners secret --exit-code 1 "${{ inputs.scan_ref }}" ;;
            fs)     trivy fs --exit-code 1 --severity "${{ inputs.fail_on_severity }}" --scanners vuln,misconfig,secret "${{ inputs.scan_ref }}" ;;
          esac
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.REPORT }}
          path: reports/
          retention-days: ${{ inputs.report_retention_days }}
