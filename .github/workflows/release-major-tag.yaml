name: Release - move major tag & publish

# On a semver tag push (vX.Y.Z), force the moving major tag (vX) to that commit
# and publish a GitHub Release. Implements the SemVer + moving-major versioning
# policy (see VERSIONING.md).

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Move major tag
        run: |
          set -eu
          VER="${GITHUB_REF_NAME}"     # vX.Y.Z
          MAJOR="${VER%%.*}"           # vX
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$VER"
          git push -f origin "refs/tags/${MAJOR}"
          echo "Moved ${MAJOR} -> ${VER}" >> "$GITHUB_STEP_SUMMARY"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" --generate-notes \
          || gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --draft=false
